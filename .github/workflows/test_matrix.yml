name: e2e_ppo_trainer_megatron
# latest version: Megatron-LM core_r0.11.0 https://github.com/NVIDIA/Megatron-LM/tree/core_r0.11.0

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
      - v0.*
      - lusz/mlp_ci
  pull_request:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      # Other entrypoints
      - "!examples/**"
      - "!tests/**"
      - "!verl/trainer/main_*.py"
      - "!verl/trainer/fsdp_sft_trainer.py"
      # Recipes
      - "!recipe/**"
      # FSDP
      - "!verl/workers/**/*dp_*.py"
      # Entrypoints
      - ".github/workflows/e2e_ppo_trainer_megatron.yml"
      - "examples/data_preprocess/gsm8k.py"
      - "examples/data_preprocess/geo3k.py"
      - "tests/e2e/run_ppo_trainer_megatron.sh"
      - "verl/trainer/main_ppo.py"
      - "verl/trainer/config/ppo_megatron_trainer.yaml"

# Cancel jobs on the same ref if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Declare permissions just read content.
permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/whatcanyousee/verl:ngc-cu124-vllm0.8.5-sglang0.4.6.post5-mcore0.12.0-te2.3"
  DYNAMIC_RUNNER_ENDPOINT: "https://sd10g3clalm04ug7alq90.apigateway-cn-beijing.volceapi.com/runner"

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4, 5, 6]
    outputs:
      runner-labels: ${{ steps.set-outputs.outputs.runner-labels }}
      mlp-task-ids: ${{ steps.set-outputs.outputs.mlp-task-ids }}
    steps:
      - uses: actions/checkout@v4
      - id: create-runner
        uses: plutoZZZZ/verl-github-runner-demo@786499d9ac3999d2189df98b3a68480275586d60
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"
      - id: set-outputs
        run: |
          runner_labels=()
          mlp_task_ids=()
          for i in {0..6}; do
            runner_labels+=("$(echo '${{ steps.create-runner.outputs }}' | jq -r ".\"runner-label-$i\"")")
            mlp_task_ids+=("$(echo '${{ steps.create-runner.outputs }}' | jq -r ".\"mlp-task-id-$i\"")")
          done
          echo "runner-labels=$(printf "%s," "${runner_labels[@]}")" >> $GITHUB_OUTPUT
          echo "mlp-task-ids=$(printf "%s," "${mlp_task_ids[@]}")" >> $GITHUB_OUTPUT
        shell: bash

  e2e_tests:
    needs: setup
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4, 5, 6]
        config: [
          {
            name: "e2e_ppo_trainer_megatron-deepseek",
            model: "deepseek-ai/deepseek-coder-1.3b-instruct",
            dataset: "gsm8k"
          },
          {
            name: "e2e_ppo_trainer_megatron-qwen3",
            model: "Qwen/Qwen3-0.6B",
            dataset: "gsm8k"
          },
          {
            name: "e2e_ppo_trainer_megatron-different-train-infer-tp-qwen-tie-embedding",
            model: "Qwen/Qwen2.5-1.5B",
            dataset: "gsm8k"
          },
          {
            name: "e2e_ppo_trainer_megatron-qwen-override-transformer-config",
            model: "Qwen/Qwen2.5-0.5B",
            dataset: "gsm8k"
          },
          {
            name: "e2e_ppo_trainer_megatron-deepseek-override-transformer-config",
            model: "deepseek-ai/deepseek-coder-1.3b-instruct",
            dataset: "gsm8k"
          },
          {
            name: "e2e_ppo_trainer_megatron-moe-expert-parallel",
            model: "Qwen/Qwen1.5-MoE-A2.7B-Chat",
            dataset: "gsm8k"
          },
          {
            name: "e2e_ppo_trainer_megatron-qwen2_5vl-3b",
            model: "Qwen/Qwen2.5-VL-3B-Instruct",
            dataset: "geo3k"
          }
        ]
    runs-on: ["${{ fromJSON(needs.setup.outputs.runner-labels)[matrix.index] || 'L20x8' }}"]
    timeout-minutes: 60
    env:
      HTTP_PROXY: ${{ secrets.PROXY_HTTP }}
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install the current repository
        run: |
          pip3 install --no-deps -e .[test]
      - name: Prepare ${{ matrix.config.dataset }} dataset
        run: |
          python3 examples/data_preprocess/${{ matrix.config.dataset }}.py
      - name: Running ${{ matrix.config.dataset }} E2E training tests with 3D parallelism on 8 L20 GPUs with Megatron (${{ last(split(matrix.config.model, '/')) }})
        run: |
          ray stop --force
          case ${{ matrix.index }} in
            0)
              ALL_OFFLOAD=True SAVE_FREQ=1 MODEL_ID=${{ matrix.config.model }} bash tests/e2e/run_ppo_trainer_megatron.sh
              RESUME_MODE=auto MODEL_ID=${{ matrix.config.model }} TOTAL_TRAIN_STEPS=2 bash tests/e2e/run_ppo_trainer_megatron.sh
              exp_name="deepseek-coder-1.3b-instruct-megatron-gsm8k-minimal"
              python scripts/model_merger.py test --backend megatron --local_dir checkpoints/verl-test/${exp_name}/global_step_1/actor --test_hf_dir checkpoints/verl-test/${exp_name}/global_step_1/actor/huggingface
              python scripts/model_merger.py test --backend megatron --is-value-model --local_dir checkpoints/verl-test/${exp_name}/global_step_1/critic --test_hf_dir checkpoints/verl-test/${exp_name}/global_step_1/critic/huggingface
              ADV_ESTIMATOR=grpo USE_DYNAMIC_BSZ=False MODEL_ID=${{ matrix.config.model }} bash tests/e2e/run_ppo_trainer_megatron.sh
              ;;
            1)
              ALL_OFFLOAD=True VAL_BEFORE_TRAIN=True TEST_FREQ=1 SAVE_FREQ=1 MODEL_ID=${{ matrix.config.model }} bash tests/e2e/run_ppo_trainer_megatron.sh
              LR_WARMUP_STEPS=1 TOTAL_TRAIN_STEPS=2 MODEL_ID=${{ matrix.config.model }} bash tests/e2e/run_ppo_trainer_megatron.sh
              exp_name="qwen3-0.6b-megatron-gsm8k-minimal"
              python scripts/model_merger.py test --backend megatron --tie-word-embedding --local_dir checkpoints/verl-test/${exp_name}/global_step_1/actor --test_hf_dir checkpoints/verl-test/${exp_name}/global_step_1/actor/huggingface
              python scripts/model_merger.py test --backend megatron --is-value-model --local_dir checkpoints/verl-test/${exp_name}/global_step_1/critic --test_hf_dir checkpoints/verl-test/${exp_name}/global_step_1/critic/huggingface
              ;;
            2)
              VAL_BEFORE_TRAIN=True TEST_FREQ=1 SAVE_FREQ=1 TRAIN_TP=2 INFER_TP=1 MODEL_ID=${{ matrix.config.model }} bash tests/e2e/run_ppo_trainer_megatron.sh
              VAL_BEFORE_TRAIN=True TEST_FREQ=1 SAVE_FREQ=1 TRAIN_TP=1 INFER_TP=2 MODEL_ID=${{ matrix.config.model }} bash tests/e2e/run_ppo_trainer_megatron.sh
              ;;
            3)
              python3 scripts/converter_hf_to_mcore.py --hf_model_path ${HOME}/models/Qwen/Qwen2.5-0.5B --output_path checkpoints/verl-test/qwen2.5-0.5b-megatron
              SAVE_FREQ=1 COMMON_PP=4 COMMON_VPP=null COMMON_CP=1 SKIP_SAVE_HF_MODEL=1 bash tests/e2e/run_ppo_trainer_megatron.sh +actor_rollout_ref.actor.megatron.override_transformer_config.num_layers_in_first_pipeline_stage=8 +actor_rollout_ref.actor.megatron.override_transformer_config.num_layers_in_last_pipeline_stage=4 actor_rollout_ref.actor.megatron.use_dist_checkpointing=true actor_rollout_ref.actor.megatron.dist_checkpointing_path=checkpoints/verl-test/qwen2.5-0.5b-megatron actor_rollout_ref.ref.megatron.use_dist_checkpointing=true actor_rollout_ref.ref.megatron.dist_checkpointing_path=checkpoints/verl-test/qwen2.5-0.5b-megatron critic.megatron.use_dist_checkpointing=true critic.megatron.dist_checkpointing_path=checkpoints/verl-test/qwen2.5-0.5b-megatron reward_model.megatron.use_dist_checkpointing=true reward_model.megatron.dist_checkpointing_path=checkpoints/verl-test/qwen2.5-0.5b-megatron
              cp -r checkpoints checkpoints-dut
              SAVE_FREQ=1 COMMON_PP=4 COMMON_VPP=null COMMON_CP=1 bash tests/e2e/run_ppo_trainer_megatron.sh
              exp_name="qwen2.5-0.5b-megatron-gsm8k-minimal"
              python scripts/model_merger.py test --backend megatron --tie-word-embedding --local_dir checkpoints-dut/verl-test/${exp_name}/global_step_1/actor --test_hf_dir checkpoints/verl-test/${exp_name}/global_step_1/actor/huggingface
              python scripts/model_merger.py test --backend megatron --is-value-model --local_dir checkpoints-dut/verl-test/${exp_name}/global_step_1/critic --test_hf_dir checkpoints/verl-test/${exp_name}/global_step_1/critic/huggingface
              ;;
            4)
              SAVE_FREQ=1 MODEL_ID=${{ matrix.config.model }} COMMON_PP=2 COMMON_VPP=null bash tests/e2e/run_ppo_trainer_megatron.sh +actor_rollout_ref.actor.megatron.override_transformer_config.account_for_embedding_in_pipeline_split=true +actor_rollout_ref.actor.megatron.override_transformer_config.account_for_loss_in_pipeline_split=true
              exp_name="deepseek-coder-1.3b-instruct-megatron-gsm8k-minimal"
              python scripts/model_merger.py test --backend megatron --local_dir checkpoints/verl-test/${exp_name}/global_step_1/actor --test_hf_dir checkpoints/verl-test/${exp_name}/global_step_1/actor/huggingface
              python scripts/model_merger.py test --backend megatron --is-value-model --local_dir checkpoints/verl-test/${exp_name}/global_step_1/critic --test_hf_dir checkpoints/verl-test/${exp_name}/global_step_1/critic/huggingface
              ;;
            5)
              ADV_ESTIMATOR=grpo USE_DUMMY_MODEL=True DUMMY_MODEL_CONFIG_PATH=tests/e2e/ppo_trainer/expert_parallel/qwen2moe_minimal.json \
              PPO_MAX_TOKEN_LEN=512 FWD_MAX_TOKEN_LEN=512 \
              MAX_PROMPT_LENGTH=256 MAX_RESPONSE_LENGTH=256 \
              MODEL_ID=${{ matrix.config.model }} \
              COMMON_PP=2 COMMON_VPP=null COMMON_CP=1 COMMON_TP=4 COMMON_EP=4 COMMON_ETP=1 INFER_TP=8 \
              USE_DIST_CKPT=True ALL_OFFLOAD=True SKIP_SAVE_HF_MODEL=1 bash tests/e2e/run_ppo_trainer_megatron.sh
              ;;
            6)
              python3 scripts/converter_hf_to_mcore.py --hf_model_path ${HOME}/models/Qwen/Qwen2.5-VL-3B-Instruct --output_path checkpoints/verl-test/qwen2.5-vl-3b-megatron
              TRAIN_FILES=${HOME}/data/geo3k/train.parquet VAL_FILES=${HOME}/data/geo3k/test.parquet MAX_PROMPT_LENGTH=1024 MAX_RESPONSE_LENGTH=2048  MODEL_ID=${{ matrix.config.model }} ADV_ESTIMATOR=grpo USE_DYNAMIC_BSZ=False SKIP_SAVE_HF_MODEL=1 COMMON_PP=4 COMMON_VPP=null COMMON_CP=1 COMMON_TP=2 USE_DIST_CKPT=true DIST_CKPT_PATH=checkpoints/verl-test/qwen2.5-vl-3b-megatron bash tests/e2e/run_ppo_trainer_megatron.sh
              ;;
          esac
      - name: clean up
        run: |
          rm -rf checkpoints

  cleanup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4, 5, 6]
        config: [
          {
            name: "e2e_ppo_trainer_megatron-deepseek"
          },
          {
            name: "e2e_ppo_trainer_megatron-qwen3"
          },
          {
            name: "e2e_ppo_trainer_megatron-different-train-infer-tp-qwen-tie-embedding"
          },
          {
            name: "e2e_ppo_trainer_megatron-qwen-override-transformer-config"
          },
          {
            name: "e2e_ppo_trainer_megatron-deepseek-override-transformer-config"
          },
          {
            name: "e2e_ppo_trainer_megatron-moe-expert-parallel"
          },
          {
            name: "e2e_ppo_trainer_megatron-qwen2_5vl-3b"
          }
        ]
    needs: [setup, e2e_tests]
    if: always()
    steps:
      - id: destroy-runner
        uses: plutoZZZZ/verl-github-runner-demo@786499d9ac3999d2189df98b3a68480275586d60
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ fromJSON(needs.setup.outputs.mlp-task-ids)[matrix.index] }}"